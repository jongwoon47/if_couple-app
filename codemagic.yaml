# Codemagic: https://codemagic.io
# 대시보드에서 Apple / Android 연동 후 빌드 (이 파일은 저장소에 커밋해 두면 자동 인식)

workflows:
  # ── Android: 서명 없이도 APK는 바로 빌드 가능 (내부 테스트용) ──
  android-apk:
    name: Android APK
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  # ── iOS: Apple Developer + App Store Connect 연동 필요 ──
  # Codemagic → Teams → Integrations → Apple developer / App Store Connect
  # 번들 ID는 Xcode의 PRODUCT_BUNDLE_IDENTIFIER와 동일해야 함 (com.ifcouple.app)
  ios-ipa:
    name: iOS IPA (TestFlight)
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ifcouple.app
      groups:
        # 대시보드에서 만든 환경 변수 그룹 이름 (API 키·인증서 등)
        - app_store_credentials
      vars:
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
    scripts:
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Get packages
        script: flutter pub get
      - name: CocoaPods
        script: cd ios && pod install
      - name: Build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
